<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Penjana Phenakistoscope</title>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <link rel="stylesheet" href="static/style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Penjana Template Phenakistoscope</h1>
        </header>

        <main class="layout-grid">
            <aside class="sidebar-panel">
                <div class="card">
                    <div class="video-container">
                        <video id="videoPreview" controls muted></video>
                        <div id="uploadPrompt" class="upload-prompt">
                            <label for="videoUpload" class="upload-btn">Pilih Video</label>
                            <input type="file" id="videoUpload" accept="video/mp4,video/x-m4v,video/*" hidden>
                        </div>
                    </div>

                    <div class="trim-controls" id="trimControls" style="display: none;">
                        <h3 style="margin-top: 0; font-size: 14px;">Trim Video</h3>
                        <div class="slider-container">
                            <div class="slider-track" id="sliderTrack"></div>
                            <input type="range" id="trimStart" min="0" max="100" value="0">
                            <input type="range" id="trimEnd" min="0" max="100" value="100">
                        </div>
                        <div class="time-display">
                            <span id="startTimeDisplay">00:00</span>
                            <span style="font-size: 12px; color: #888;">hingga</span>
                            <span id="endTimeDisplay">00:00</span>
                        </div>
                    </div>
                </div>

                <div class="card">
                    <h3 style="margin-top: 0;">Parameter Template</h3>
                    <div class="input-group">
                        <label for="diameter">Diameter Template (cm):</label>
                        <input type="number" id="diameter" value="20" max="21" step="0.5">
                    </div>
                    
                    <div class="input-group">
                        <label for="slices">Bilangan Bahagian (Bingkai):</label>
                        <input type="number" id="slices" value="8" min="4" max="24">
                    </div>

                    <div class="input-group">
                        <label for="imageScale">Skala Gambar (1.0 = Asal):</label>
                        <input type="number" id="imageScale" value="1.0" min="0.1" max="3.0" step="0.1">
                    </div>

                    <div class="input-group">
                        <label for="edgeDistance">Jarak dari Pinggir (cm):</label>
                        <input type="number" id="edgeDistance" value="1.0" min="0" max="10" step="0.1">
                    </div>

                    <button id="btnGenerate" class="generate-btn" disabled>Cipta Template PDF</button>
                </div>
            </aside>

            <section class="hero-panel">
                <div class="preview-card">
                    <div class="preview-header">
                        <h2>Live Prebiu</h2>
                        <button id="btnPlayPreview" class="play-sim-btn" style="display: none;">▶ Mainkan Simulasi</button>
                    </div>
                    
                    <div class="canvas-wrapper">
                        <div class="previews-container">
                            <div class="canvas-item">
                                <h4>Cakera Penuh</h4>
                                <canvas id="layoutPreview" width="500" height="500"></canvas>
                            </div>
                            <div class="canvas-item">
                                <h4>Animasi Bersih</h4>
                                <canvas id="animationPreview" width="500" height="500"></canvas>
                            </div>
                        </div>
                        
                        <div id="loadingOverlay" class="loading-overlay" style="display: none;">
                            <div class="loader-spinner"></div>
                            <span>Mengekstrak Frame...</span>
                        </div>
                    </div>
                    
                    <p id="statusText" class="status-message">Menunggu video dimuat naik...</p>
                </div>
            </section>
        </main>
    </div>

    <script src="static/script.js?v=2.1"></script>
</body>
</html>
